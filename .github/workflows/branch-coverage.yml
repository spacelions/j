name: branch-coverage

on:
  push:
  pull_request:

jobs:
  branch-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache: true
      - name: branch-coverage
        run: make branch-coverage
