# Lefthook config. Install once per clone with `make install-hooks`
# (which runs `go tool lefthook install` and wires the git hooks).
#
# commit-msg runs:
#   1. commit-message: fails if the commit subject does not follow the
#      project SPA message format.
#
# pre-commit runs:
#   1. line-cap:      fails if any staged non-test file exceeds 300
#                     lines, any line exceeds 80 chars, or any method
#                     exceeds 80 lines.
#   2. lint:          runs `make lint` (golangci-lint over the whole
#                     module).
#   3. tests:         runs `make test`.
#   4. line-coverage: runs `make line-coverage` so the
#                     100%-or-allowlist gate matches CI locally.

commit-msg:
  commands:
    commit-message:
      run: .hooks/check-commit-message {1}

pre-commit:
  piped: true
  commands:
    line-cap:
      priority: 1
      run: .hooks/check-line-cap {staged_files}
      exclude:
        - "*_test.go"
        - "vendor/**"
        - "bin/**"
        - "testcases/**"
        - ".j/**"
        - "go.sum"
        - "go.mod"
        - ".agents/**"
        - "skills-lock.json"
    lint:
      priority: 2
      run: make lint
    tests:
      priority: 3
      run: make test
    line-coverage:
      priority: 4
      run: make line-coverage
